<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT GALLERY - 명장면 갤러리</title>
    <style>
        :root {
            --color-primary: #FF4655;
            --color-secondary: #0F1923;
            --color-accent: #53E9FF;
            --color-gold: #FFD700;
            --color-dark: #0A0E12;
            --color-light: #ECF0F1;
            
            --font-display: 'Druk Wide', 'Impact', sans-serif;
            --font-body: 'DIN Next', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-dark);
            color: var(--color-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-primary);
            border-radius: 4px;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 2rem;
            background: rgba(10, 14, 18, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 70, 85, 0.1);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--color-light);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 0.5rem 1rem;
            position: relative;
            transition: 0.2s;
        }

        .nav-links a.active {
            color: var(--color-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-primary);
            transition: 0.2s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Header */
        .page-header {
            margin-top: 80px;
            padding: 4rem 2rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(255, 70, 85, 0.15) 0%, rgba(83, 233, 255, 0.1) 100%);
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 70, 85, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 50%, rgba(83, 233, 255, 0.2) 0%, transparent 40%);
            animation: galleryShimmer 8s ease-in-out infinite;
        }

        @keyframes galleryShimmer {
            0%, 100% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(20px); opacity: 1; }
        }

        .page-title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: var(--color-light);
            text-shadow: 0 0 40px rgba(255, 70, 85, 0.5);
            position: relative;
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1.2rem;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            position: relative;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            flex-wrap: wrap;
        }

        .filter-tab {
            background: rgba(255, 70, 85, 0.1);
            border: 2px solid rgba(255, 70, 85, 0.3);
            color: var(--color-light);
            padding: 0.8rem 2rem;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .filter-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            transition: 0.3s;
            z-index: -1;
        }

        .filter-tab:hover::before,
        .filter-tab.active::before {
            left: 0;
        }

        .filter-tab.active {
            border-color: var(--color-primary);
            color: var(--color-dark);
        }

        /* Gallery Grid */
        .gallery-container {
            max-width: 1600px;
            margin: 2rem auto;
            padding: 0 2rem 4rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
            grid-auto-flow: dense;
        }

        .gallery-item {
            position: relative;
            height: 350px;
            background: linear-gradient(135deg, rgba(15, 25, 35, 0.8) 0%, rgba(10, 14, 18, 0.9) 100%);
            border: 2px solid rgba(255, 70, 85, 0.2);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item.large {
            grid-column: span 2;
            height: 450px;
        }

        .gallery-item:hover {
            border-color: var(--color-primary);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 80px rgba(255, 70, 85, 0.4);
            z-index: 10;
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF4655 0%, #53E9FF 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            transition: 0.4s;
        }

        .gallery-item.large .gallery-image {
            font-size: 8rem;
        }

        .gallery-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: imageGlow 4s ease-in-out infinite;
        }

        @keyframes imageGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .gallery-item:hover .gallery-image {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(0deg, rgba(10, 14, 18, 0.95) 0%, transparent 100%);
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }

        .gallery-category {
            display: inline-block;
            background: var(--color-primary);
            color: var(--color-dark);
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .gallery-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: var(--color-light);
        }

        .gallery-item.large .gallery-title {
            font-size: 2rem;
        }

        .gallery-description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(236, 240, 241, 0.8);
        }

        .gallery-stats {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--color-accent);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 18, 0.98);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
            animation: lightboxFade 0.3s ease;
        }

        @keyframes lightboxFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lightbox-content {
            max-width: 1200px;
            width: 100%;
            position: relative;
            animation: lightboxSlide 0.4s ease;
        }

        @keyframes lightboxSlide {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: none;
            border: none;
            color: var(--color-light);
            font-size: 3rem;
            cursor: pointer;
            transition: 0.2s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-close:hover {
            color: var(--color-primary);
            transform: rotate(90deg);
        }

        .lightbox-image {
            width: 100%;
            height: 600px;
            background: linear-gradient(135deg, #FF4655 0%, #53E9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10rem;
            margin-bottom: 2rem;
            border: 3px solid var(--color-primary);
        }

        .lightbox-info {
            padding: 2rem;
            background: rgba(15, 25, 35, 0.8);
            border: 2px solid rgba(255, 70, 85, 0.3);
        }

        .lightbox-title {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--color-primary);
            margin-bottom: 1rem;
        }

        .lightbox-description {
            font-size: 1.2rem;
            line-height: 1.8;
            color: rgba(236, 240, 241, 0.9);
            margin-bottom: 1.5rem;
        }

        .lightbox-meta {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .meta-label {
            font-size: 0.8rem;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .meta-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--color-light);
        }

        /* Footer */
        .footer {
            background: rgba(15, 25, 35, 0.5);
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255, 70, 85, 0.2);
            margin-top: 4rem;
        }

        .footer-text {
            color: rgba(236, 240, 241, 0.6);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .gallery-item,
            .gallery-item.large {
                grid-column: span 1;
                height: 350px;
            }

            .gallery-image,
            .gallery-item.large .gallery-image {
                font-size: 4rem;
            }

            .lightbox-image {
                height: 400px;
                font-size: 6rem;
            }

            .lightbox-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

        // Render Gallery
        function renderGallery(filter = 'all') {
            const grid = document.getElementById('galleryGrid');
            const filtered = filter === 'all' 
                ? galleryItems 
                : galleryItems.filter(item => item.category === filter);

            grid.innerHTML = filtered.map(item => `
                <div class="gallery-item ${item.large ? 'large' : ''}" onclick="openLightbox(${item.id})" data-category="${item.category}">
                    <div class="gallery-image" style="background: linear-gradient(135deg, ${item.color} 0%, #53E9FF 100%);">
                        ${item.icon}
                    </div>
                    <div class="gallery-overlay">
                        <span class="gallery-category">${item.category.toUpperCase()}</span>
                        <h3 class="gallery-title">${item.title}</h3>
                        <p class="gallery-description">${item.description}</p>
                        <div class="gallery-stats">
                            <span class="stat-item">👁️ ${item.views}</span>
                            <span class="stat-item">❤️ ${item.likes}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // Animate items
            document.querySelectorAll('.gallery-item').forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateY(30px)';
                setTimeout(() => {
                    item.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                }, index * 50);
            });
        }

        // Filter Tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderGallery(tab.dataset.filter);
            });
        });

        // Lightbox Functions
        function openLightbox(id) {
            const item = galleryItems.find(i => i.id === id);
            if (!item) return;

            document.getElementById('lightboxImageContainer').innerHTML = `
                <div class="lightbox-image" style="background: linear-gradient(135deg, ${item.color} 0%, #53E9FF 100%);">
                    ${item.icon}
                </div>
            `;
            document.getElementById('lightboxTitle').textContent = item.title;
            document.getElementById('lightboxDescription').textContent = item.description;
            document.getElementById('lightboxMeta').innerHTML = `
                <div class="meta-item">
                    <span class="meta-label">Player</span>
                    <span class="meta-value">${item.player}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Tournament</span>
                    <span class="meta-value">${item.tournament}</span>
                </div>
                <div class="meta-item">

                    <span class="meta-value">${item.date}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Views</span>
                    <span class="meta-value">${item.views}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Likes</span>
                    <span class="meta-value">${item.likes}</span>
                </div>
            `;

            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close lightbox on outside click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });

        // Close lightbox on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Initial render
        renderGallery();
    </script>
</body>
</html>
