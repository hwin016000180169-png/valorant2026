<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT AGENTS - 요원 소개</title>
    <style>
        :root {
            --color-primary: #FF4655;
            --color-secondary: #0F1923;
            --color-accent: #53E9FF;
            --color-gold: #FFD700;
            --color-dark: #0A0E12;
            --color-light: #ECF0F1;
            
            --font-display: 'Druk Wide', 'Impact', sans-serif;
            --font-body: 'DIN Next', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-dark);
            color: var(--color-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-primary);
            border-radius: 4px;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 2rem;
            background: rgba(10, 14, 18, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 70, 85, 0.1);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--color-light);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 0.5rem 1rem;
            position: relative;
            transition: 0.2s;
        }

        .nav-links a.active {
            color: var(--color-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-primary);
            transition: 0.2s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Header */
        .page-header {
            margin-top: 80px;
            padding: 4rem 2rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(255, 70, 85, 0.1) 0%, transparent 100%);
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,70,85,0.05)" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/></svg>');
            animation: gridFlow 20s linear infinite;
        }

        @keyframes gridFlow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        .page-title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: var(--color-light);
            text-shadow: 0 0 40px rgba(255, 70, 85, 0.5);
            position: relative;
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1.2rem;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            position: relative;
        }

        /* Role Filter */
        .role-filter {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .role-filter img {
            width: 1.5rem;
            height: 1.5rem;
            display: inline-block;
            margin-top: 3px;
        }
        .role-btn {
            background: rgba(255, 70, 85, 0.1);
            border: 2px solid var(--color-primary);
            color: var(--color-light);
            padding: 0.8rem 2rem;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .role-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--color-primary);
            transition: 0.3s;
            z-index: -1;
        }

        .role-btn:hover::before,
        .role-btn.active::before {
            left: 0;
        }

        .role-btn.active {
            border-color: var(--color-primary);
            color: var(--color-dark);
        }

        /* Agents Grid */
        .agents-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .agent-card {
            background: linear-gradient(135deg, rgba(15, 25, 35, 0.8) 0%, rgba(10, 14, 18, 0.9) 100%);
            border: 2px solid rgba(255, 70, 85, 0.2);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            height: 450px;
        }

        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
            opacity: 0;
            transition: 0.4s;
            z-index: 0;
        }

        .agent-card:hover::before {
            opacity: 0.1;
        }

        .agent-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--color-primary);
            box-shadow: 0 20px 60px rgba(255, 70, 85, 0.3);
        }

        .agent-image {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #FF4655 0%, #53E9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }

        .agent-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: var(--agent-image, none);
            background-position: top;
            background-size: cover;
            background-repeat: no-repeat;
        }

        @keyframes agentGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .agent-info {
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .agent-role {
            font-size: 0.75rem;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .agent-name {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            
            color: var(--color-light);
        }

        .agent-description {
            font-size: 0.9rem;
            color: rgba(236, 240, 241, 0.7);
            line-height: 1.6;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 18, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 0;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            max-width: 900px;
            width: 90%;
            background: linear-gradient(135deg, rgba(15, 25, 35, 0.9) 0%, rgba(10, 14, 18, 0.95) 100%);
            border: 2px solid var(--color-primary);
            padding: 3rem;
            position: relative;
            margin: 0 2rem 2rem 2rem;
            animation: modalSlideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalSlideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
            .role-icon {
                width: 1.5rem;       /* 텍스트 크기에 맞춰 너비 조정 */
                height: 1.5rem;      /* 높이 조정 */
                object-fit: contain; /* 이미지 비율 유지 */
                vertical-align: middle; /* 텍스트와 수직 정렬 맞춤 */
                margin-right: 5px;   /* 텍스트와의 간격 */
                margin-top: -3px;    /* 미세 위치 조정 (필요 시) */
            }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--color-light);
            font-size: 2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .modal-close:hover {
            color: var(--color-primary);
            transform: rotate(90deg);
        }

        .modal-agent-name {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--color-primary);
            margin-bottom: 1rem;
        }

        .modal-agent-role {
            font-size: 1rem;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .modal-agent-bio {
            font-size: 1.1rem;
            line-height: 1.8;
            color: rgba(236, 240, 241, 0.9);
            margin-bottom: 2rem;
        }

        .abilities-section {
            margin-top: 2rem;
        }

        .abilities-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--color-light);
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 0.5rem;
        }

        .ability {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(255, 70, 85, 0.05);
            border-left: 3px solid var(--color-accent);
            transition: background 0.3s ease;
            cursor: pointer;
        }
        .ability:hover {
            background: rgba(255, 70, 85, 0.15); /* 호버 시 배경색 살짝 변경 */
        }


        .ability-video-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), margin-top 0.4s ease;
            margin-top: 0;
            opacity: 0;
        }

        .ability:hover .ability-video-wrapper {
            max-height: 400px; /* 비디오 높이에 맞춰 넉넉하게 설정 */
            margin-top: 1rem;
            opacity: 1;
        }

        .ability-video {
            width: 100%;
            border-radius: 4px;
            border: 1px solid var(--color-primary);
            background: #000;
            display: block;
        }
        .ability-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--color-accent);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .ability-description {
            color: rgba(236, 240, 241, 0.8);
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            background: rgba(15, 25, 35, 0.5);
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255, 70, 85, 0.2);
            margin-top: 4rem;
        }

        .footer-text {
            color: rgba(236, 240, 241, 0.6);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .agents-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 3rem;
            }

            .modal-content {
                padding: 2rem;
            }

            .modal-agent-name {
                font-size: 2rem;
            }
        }
    </style>
</head>

        // Render Agents
        function renderAgents(filterRole = 'all') {
            const grid = document.getElementById('agentsGrid');
            const filteredAgents = filterRole === 'all' 
                ? agents 
                : agents.filter(agent => agent.role === filterRole);

            grid.innerHTML = filteredAgents.map(agent => `
                <div class="agent-card" onclick="openModal(${agent.id})" data-role="${agent.role}">
                    <div class="agent-image" data-image="${agent.image || ''}">
                        ${agent.icon}
                    </div>
                    <div class="agent-info">
                        <div class="agent-role">${getRoleLabel(agent.role)}</div>
                        <h3 class="agent-name">${agent.name}</h3>
                        <p class="agent-description">${agent.description}</p>
                    </div>
                </div>
            `).join('');

            // 각 요원 이미지에 배경 적용
            document.querySelectorAll('.agent-image[data-image]').forEach(element => {
                const imageUrl = element.getAttribute('data-image');
                if (imageUrl) {
                    element.style.setProperty('--agent-image', `url('${imageUrl}')`);
                }
            });
        }

function getRoleLabel(role) {
    const labels = {
        duelist: '<img src="../images/roles/duelist.png" class="role-icon"> DUELIST',
        controller: '<img src="../images/roles/controller.png" class="role-icon"> CONTROLLER',
        sentinel: '<img src="../images/roles/sentinel.png" class="role-icon"> SENTINEL',
        initiator: '<img src="../images/roles/initiator.png" class="role-icon"> INITIATOR'
    };
    return labels[role] || role;
}

        function openModal(agentId) {
    const agent = agents.find(a => a.id === agentId);
    if (!agent) return;

    const modal = document.getElementById('agentModal');
    const content = document.getElementById('modalContent');

    // 1. HTML 구조 생성 (비디오 래퍼 추가)
    content.innerHTML = `
        <h2 class="modal-agent-name">${agent.name}</h2>
        <div class="modal-agent-role">${getRoleLabel(agent.role)}</div>
        <p class="modal-agent-bio">${agent.bio}</p>
        <div class="abilities-section">
            <h3 class="abilities-title">ABILITIES</h3>
            ${agent.abilities.map(ability => `
                <div class="ability">
                    <div class="ability-name">${ability.name}</div>
                    <div class="ability-description">${ability.description}</div>
                    
                    ${ability.video ? `
                    <div class="ability-video-wrapper">
                        <video class="ability-video" loop muted playsinline>
                            <source src="${ability.video}" type="video/mp4">
                        </video>
                    </div>
                    ` : ''}
                </div>
            `).join('')}
        </div>
    `;

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    // 2. 호버 이벤트 리스너 추가 (자동 재생 기능)
    const abilityCards = content.querySelectorAll('.ability');
    
    abilityCards.forEach(card => {
        const video = card.querySelector('video');
        
        if (video) {
            // 마우스 올리면 재생
            card.addEventListener('mouseenter', () => {
                video.currentTime = 0; // 처음부터 재생
                video.play().catch(e => console.log("Auto-play prevented")); 
            });

            // 마우스 떼면 일시정지
            card.addEventListener('mouseleave', () => {
                video.pause();
            });
        }
    });
}

        function closeModal() {
            const modal = document.getElementById('agentModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Role Filter
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderAgents(btn.dataset.role);
            });
        });

        // Close modal on outside click
        document.getElementById('agentModal').addEventListener('click', (e) => {
            if (e.target.id === 'agentModal') {
                closeModal();
            }
        });

        // Close modal on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initial render
        renderAgents();
    </script>
